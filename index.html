<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ИИ-дашборды Барселоновны · Barcelonovna AI Dashboards</title>
<meta name="description" content="Коллекция интерактивных дашбордов на данных. Collection of interactive data dashboards.">
<style>
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --surface-2: #f1efe8;
    --text: #1a1a17;
    --text-2: #6b6a64;
    --text-3: #9a9994;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.18);
    --accent: #378ADD;
    --accent-bg: rgba(55,138,221,0.08);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a17;
      --surface: #25241f;
      --surface-2: #2f2e29;
      --text: #ededeb;
      --text-2: #a8a79f;
      --text-3: #6f6e68;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.2);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; }
  a { color: inherit; text-decoration: none; }

  .container { max-width: 1100px; margin: 0 auto; padding: 48px 24px 64px; }

  .header { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 56px; }
  .header-text { flex: 1; min-width: 0; }
  .brand { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
  h1 { font-size: 36px; font-weight: 500; margin: 0 0 10px; letter-spacing: -0.02em; line-height: 1.15; }
  .subtitle { color: var(--text-2); font-size: 16px; margin: 0; line-height: 1.55; max-width: 580px; }

  .lang-switch { display: flex; background: var(--surface-2); border-radius: var(--radius-md); padding: 3px; flex-shrink: 0; }
  .lang-btn { background: transparent; border: none; padding: 6px 14px; font-size: 13px; font-weight: 500; color: var(--text-2); cursor: pointer; border-radius: 6px; font-family: inherit; transition: all 0.15s; }
  .lang-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }

  .section-title { font-size: 14px; font-weight: 500; color: var(--text-2); margin: 0 0 18px; letter-spacing: 0.02em; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    display: flex; flex-direction: column;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    border-color: var(--border-strong);
  }

  .card-preview {
    position: relative;
    width: 100%;
    aspect-ratio: 16/10;
    background: var(--surface-2);
    overflow: hidden;
  }
  .card-preview iframe {
    position: absolute;
    top: 0; left: 0;
    width: 1280px; height: 800px;
    border: 0;
    transform-origin: top left;
    pointer-events: none;
  }
  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.04) 100%);
    pointer-events: none;
  }
  .card-badge {
    position: absolute; top: 12px; left: 12px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
    color: var(--text);
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 4px 8px; border-radius: 4px;
  }
  @media (prefers-color-scheme: dark) {
    .card-badge { background: rgba(37,36,31,0.92); color: var(--text); }
  }

  .card-body { padding: 18px 20px 20px; }
  .card-title { font-size: 18px; font-weight: 500; margin: 0 0 6px; letter-spacing: -0.01em; }
  .card-desc { font-size: 14px; color: var(--text-2); margin: 0 0 14px; line-height: 1.5; }
  .card-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-3); align-items: center; }
  .card-meta-item { display: inline-flex; align-items: center; gap: 4px; }
  .card-arrow { margin-left: auto; font-size: 18px; color: var(--text-3); transition: transform 0.18s, color 0.18s; }
  .card:hover .card-arrow { color: var(--accent); transform: translateX(3px); }

  .empty-card {
    background: transparent;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-lg);
    aspect-ratio: 16/10;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-3); font-size: 14px;
    text-align: center; padding: 24px;
  }

  .footer {
    margin-top: 64px; padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--text-3); font-size: 12px; line-height: 1.6;
    display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }

  @media (max-width: 600px) {
    .container { padding: 32px 16px 40px; }
    .header { flex-direction: column; gap: 18px; margin-bottom: 40px; }
    .lang-switch { align-self: flex-start; }
    h1 { font-size: 28px; }
    .subtitle { font-size: 15px; }
    .grid { grid-template-columns: 1fr; gap: 18px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-text">
      <div class="brand" id="brand">ИИ-дашборды Барселоновны</div>
      <h1 id="page-title">Дашборды Барселоновны</h1>
      <p class="subtitle" id="page-subtitle">Коллекция интерактивных дашбордов на открытых данных. Без рекламы, без лишнего, без авторегистрации. Сделано с любовью и ИИ 😊</p>
    </div>
    <div class="lang-switch" role="tablist">
      <button class="lang-btn active" data-lang="ru" role="tab">RU</button>
      <button class="lang-btn" data-lang="en" role="tab">EN</button>
    </div>
  </div>

  <h2 class="section-title" id="section-title">Дашборды</h2>
  <div class="grid" id="grid"></div>

  <div class="footer">
    <div id="footer-left">Подборка обновляется. Last update: <span id="last-update">мая 2026</span>.</div>
    <div id="footer-right">Made with care.</div>
  </div>

</div>

<script>
(function(){

// ─── Конфигурация дашбордов ──────────────────────────────────────────────
// Добавлять новые: просто добавь объект в массив.
// path: путь к папке дашборда (с index.html внутри)
// badge: короткая метка категории (необязательно)
// date: ГГГГ-ММ для сортировки и подписи

const DASHBOARDS = [
  {
    path: "social-connections/",
    date: "2026-05",
    badge: { ru: "Здоровье", en: "Health" },
    title: {
      ru: "Связи продлевают жизнь",
      en: "Connection extends life"
    },
    desc: {
      ru: "Качество отношений — один из сильнейших известных факторов здоровья. Данные Гарвардского исследования и мета-анализа 3,4 млн человек.",
      en: "Relationship quality is among the strongest known predictors of health. Based on Harvard Study and a meta-analysis of 3.4M people."
    },
    meta: {
      ru: ["85 лет данных", "Harvard / PLOS", "Мета-анализ"],
      en: ["85 years of data", "Harvard / PLOS", "Meta-analysis"]
    }
  },
  {
    path: "population-map/",
    date: "2026-04",
    badge: { ru: "Демография", en: "Demographics" },
    title: {
      ru: "Население мира до 2100 года",
      en: "World population to 2100"
    },
    desc: {
      ru: "Интерактивная карта прогноза ООН по странам. Зоны роста и падения, топ-20, ползунок по годам.",
      en: "Interactive UN projection map. Growth and decline zones, top 20, year slider."
    },
    meta: {
      ru: ["95 стран", "2024–2100", "Данные ООН"],
      en: ["95 countries", "2024–2100", "UN data"]
    }
  }
  // Следующий дашборд добавится сюда
];

// ─── i18n ────────────────────────────────────────────────────────────────
const I18N = {
  ru: {
    brand: "ИИ-дашборды Барселоновны",
    title: "Дашборды Барселоновны",
    subtitle: "Коллекция интерактивных дашбордов на открытых данных. Без рекламы, без лишнего, без авторегистрации. Сделано с любовью и ИИ 😊",
    section: "Дашборды",
    open: "Открыть",
    soon: "Скоро здесь появятся новые дашборды",
    lastUpdate: "Обновлено: ",
    madeWith: "Сделано с заботой.",
    pageTitle: "ИИ-дашборды Барселоновны",
    htmlLang: "ru"
  },
  en: {
    brand: "Barcelonovna AI Dashboards",
    title: "Barcelonovna's Dashboards",
    subtitle: "A collection of interactive dashboards built on open data. No ads, no fluff, no signup. Made with love and AI 😊",
    section: "Dashboards",
    open: "Open",
    soon: "New dashboards will appear here soon",
    lastUpdate: "Updated: ",
    madeWith: "Made with care.",
    pageTitle: "Barcelonovna AI Dashboards",
    htmlLang: "en"
  }
};

const MONTHS = {
  ru: ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"],
  en: ["January","February","March","April","May","June","July","August","September","October","November","December"]
};

let lang = "ru";

function formatDate(dateStr, l){
  const [y, m] = dateStr.split("-").map(Number);
  return MONTHS[l][m-1] + " " + y;
}

// ─── рендер карточек ────────────────────────────────────────────────────
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  // Все карточки сортируем по дате убыванием (свежие сверху)
  const sorted = [...DASHBOARDS].sort((a,b) => (a.date < b.date ? 1 : -1));

  sorted.forEach((d, i) => {
    const card = document.createElement("a");
    card.className = "card";
    card.href = d.path + "?lang=" + lang;
    
    const preview = document.createElement("div");
    preview.className = "card-preview";

    // Живой iframe-превью. Масштаб подбираем под ширину карточки.
    const iframe = document.createElement("iframe");
    iframe.src = d.path + "?lang=" + lang + "&embed=1";
    iframe.loading = "lazy";
    iframe.setAttribute("scrolling", "no");
    iframe.setAttribute("tabindex", "-1");
    iframe.setAttribute("aria-hidden", "true");
    preview.appendChild(iframe);

    const overlay = document.createElement("div");
    overlay.className = "card-overlay";
    preview.appendChild(overlay);

    if(d.badge){
      const badge = document.createElement("div");
      badge.className = "card-badge";
      badge.textContent = d.badge[lang];
      preview.appendChild(badge);
    }

    card.appendChild(preview);

    const body = document.createElement("div");
    body.className = "card-body";
    body.innerHTML = 
      '<div class="card-title">'+d.title[lang]+'</div>' +
      '<div class="card-desc">'+d.desc[lang]+'</div>' +
      '<div class="card-meta">' +
        d.meta[lang].map(m => '<span class="card-meta-item">'+m+'</span>').join('<span style="color:var(--text-3)">·</span>') +
        '<span class="card-arrow">→</span>' +
      '</div>';
    card.appendChild(body);
    grid.appendChild(card);
  });

  // Если дашбордов мало, добавляем "Скоро" плейсхолдер для красоты сетки
  if(sorted.length < 3){
    for(let k = sorted.length; k < 3; k++){
      const empty = document.createElement("div");
      empty.className = "empty-card";
      empty.textContent = I18N[lang].soon;
      grid.appendChild(empty);
    }
  }

  // Масштабируем iframe-превью под ширину карточки
  scalePreviews();
}

function scalePreviews(){
  // iframe внутри отрендерен в 1280×800, контейнер aspect 16:10
  // вычисляем нужный масштаб по ширине
  document.querySelectorAll(".card-preview").forEach(p => {
    const iframe = p.querySelector("iframe");
    if(!iframe) return;
    const w = p.clientWidth;
    const scale = w / 1280;
    iframe.style.transform = "scale(" + scale + ")";
  });
}

window.addEventListener("resize", scalePreviews);

// ─── переключение языка ────────────────────────────────────────────────
function applyLang(newLang){
  lang = newLang;
  const t = I18N[lang];
  document.documentElement.lang = t.htmlLang;
  document.title = t.pageTitle;
  document.getElementById("brand").textContent = t.brand;
  document.getElementById("page-title").textContent = t.title;
  document.getElementById("page-subtitle").textContent = t.subtitle;
  document.getElementById("section-title").textContent = t.section;
  document.getElementById("footer-right").textContent = t.madeWith;
  document.getElementById("footer-left").innerHTML = t.lastUpdate + '<span id="last-update">' + formatDate(getLatestDate(), lang) + '</span>';
  document.querySelectorAll(".lang-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.lang === newLang);
  });
  // Запоминаем выбор
  try { localStorage.setItem("lang", newLang); } catch(e){}
  render();
}

function getLatestDate(){
  return [...DASHBOARDS].sort((a,b) => (a.date < b.date ? 1 : -1))[0]?.date || "2026-05";
}

document.querySelectorAll(".lang-btn").forEach(b => {
  b.addEventListener("click", () => applyLang(b.dataset.lang));
});

// Инициализация: сначала смотрим URL, потом localStorage, иначе RU
const params = new URLSearchParams(window.location.search);
const urlLang = params.get("lang");
let initLang = "ru";
try {
  initLang = urlLang || localStorage.getItem("lang") || "ru";
} catch(e){
  initLang = urlLang || "ru";
}
if(initLang !== "ru" && initLang !== "en") initLang = "ru";
applyLang(initLang);

})();
</script>
</body>
</html>
