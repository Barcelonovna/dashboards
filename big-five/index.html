      if(days < 365) return `${Math.floor(days/30)} months ago`;
      return `${Math.floor(days/365)} years ago`;
    },
    delta_label: "Δ from last time:",

    footer: 'Questionnaire — <a href="https://www.colby.edu/psychology/wp-content/uploads/sites/50/2019/04/BFI2-S-form.pdf" target="_blank" rel="noopener">BFI-2-S, Soto &amp; John (2017)</a>. Norms — Soto, John, Gosling, Potter (2011). Validated test, but not a substitute for professional consultation.'
  }
};

// ====== Норматив (Soto, John, Gosling, Potter 2011) ======
// Возвращает среднее и SD по 100-балльной шкале для каждой черты с учётом возраста и пола.
// Тренды основаны на главных эффектах: N убывает, C растёт до 50 потом плато, A растёт, O чуть снижается после 60, E чуть снижается с 30, плюс гендерные сдвиги.
function getNorm(age, gender) {
  age = Math.max(15, Math.min(80, age));
  // Базовые средние при age=25, gender=any (по 100-шкале, конвертация из 5-балльной)
  // Подвешены под порядки величин Soto 2011
  // Возрастные эффекты в баллах за 10 лет:
  // N: -2.0, C: +2.5 (до 50, потом 0), A: +1.5, O: -0.5 (после 50: -1.0), E: -0.5
  const dec = (age - 25) / 10; // десятилетий от 25

  function ageDelta(trait){
    if (trait === "N") return -2.0 * dec;
    if (trait === "C") return age <= 50 ? 2.5 * dec : (2.5 * 2.5) + 0.2 * ((age - 50) / 10);
    if (trait === "A") return 1.5 * dec;
    if (trait === "O") return age <= 50 ? -0.5 * dec : -0.5 * 2.5 - 1.5 * ((age - 50) / 10);
    if (trait === "E") return -0.5 * dec;
    return 0;
  }

  // Гендерные сдвиги (среднее по литературе)
  const gShift = {
    f: { O: -1, C: 0, E: 1, A: 4, N: 6 },
    m: { O: 1, C: 0, E: -1, A: -4, N: -6 },
    any: { O: 0, C: 0, E: 0, A: 0, N: 0 }
  };

  const base = { O: 62, C: 60, E: 52, A: 60, N: 50 };
  const result = {};
  ["O","C","E","A","N"].forEach(t => {
    const mean = Math.max(20, Math.min(85, base[t] + ageDelta(t) + gShift[gender][t]));
    const sd = { O: 13, C: 13, E: 14, A: 12, N: 15 }[t];
    result[t] = { mean: mean, sd: sd };
  });
  return result;
}

// ====== Утилиты ======
function $(id){ return document.getElementById(id); }
function el(tag, attrs, children){
  const e = document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(k => {
    if(k === "class") e.className = attrs[k];
    else if(k === "html") e.innerHTML = attrs[k];
    else if(k.startsWith("on")) e.addEventListener(k.substring(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  if(children){
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if(c == null) return;
      e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    });
  }
  return e;
}

function setStage(name){
  document.querySelectorAll(".stage").forEach(s => s.classList.remove("active"));
  $(`stage-${name}`).classList.add("active");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function levelOf(score, mean, sd){
  if(score > mean + 0.5 * sd) return "high";
  if(score < mean - 0.5 * sd) return "low";
  return "mid";
}

function colorFor(t){
  return getComputedStyle(document.documentElement).getPropertyValue(`--c-${t}`).trim();
}

// ====== Считаем результат ======
function computeScores(){
  const sums = { O: [], C: [], E: [], A: [], N: [] };
  ITEMS.forEach((it, i) => {
    let v = answers[i];
    if(v == null) return;
    if(it.revScore) v = 6 - v;
    sums[it.trait].push(v);
  });
  const out = {};
  Object.keys(sums).forEach(t => {
    const arr = sums[t];
    if(arr.length === 0) { out[t] = 50; return; }
    const avg = arr.reduce((a,b)=>a+b, 0) / arr.length; // 1..5
    out[t] = Math.round((avg - 1) / 4 * 100); // 0..100
  });
  return out;
}

// ====== Радар SVG ======
function renderRadar(){
  const t = I18N[lang];
  const traits = ["O","C","E","A","N"];
  const cx = 230, cy = 230, R = 145;
  const svg = $("radar-svg");
  let html = "";

  function pt(i, r){
    const a = -Math.PI/2 + i * 2*Math.PI/5;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  }

  // Сетка
  for(let lvl = 1; lvl <= 4; lvl++){
    const r = R * lvl/4;
    let pts = "";
    for(let i=0;i<5;i++){ const [x,y]=pt(i,r); pts += `${x.toFixed(1)},${y.toFixed(1)} `; }
    html += `<polygon points="${pts.trim()}" fill="none" stroke="var(--border)" stroke-width="1"/>`;
  }
  // Оси
  for(let i=0;i<5;i++){ const [x,y]=pt(i,R); html += `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1"/>`; }
  // 50-метка по кругу не нужна, лейблы достаточны

  // Нормативная зона
  if(compareMode === "norm" || compareMode === "age"){
    const ageUse = compareMode === "age" ? ageForCompare : demo.age;
    const norm = getNorm(ageUse, demo.gender);
    // SD-полоса (mean +- 0.5 SD)
    let outer = "", inner = "";
    for(let i=0;i<5;i++){
      const tr = traits[i];
      const hi = Math.min(100, norm[tr].mean + 0.5*norm[tr].sd);
      const lo = Math.max(0, norm[tr].mean - 0.5*norm[tr].sd);
      const [xh,yh]=pt(i, R*hi/100);
      const [xl,yl]=pt(i, R*lo/100);
      outer += `${xh.toFixed(1)},${yh.toFixed(1)} `;
      inner += `${xl.toFixed(1)},${yl.toFixed(1)} `;
    }
    html += `<polygon points="${outer.trim()}" fill="rgba(55,138,221,0.10)" stroke="none"/>`;
    html += `<polygon points="${inner.trim()}" fill="var(--bg)" stroke="none"/>`;

    // Линия среднего
    let mean = "";
    for(let i=0;i<5;i++){
      const tr = traits[i];
      const [x,y] = pt(i, R*norm[tr].mean/100);
      mean += `${x.toFixed(1)},${y.toFixed(1)} `;
    }
    html += `<polygon points="${mean.trim()}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.75"/>`;
  }

  // Юзер
  let userPts = "";
  for(let i=0;i<5;i++){
    const tr = traits[i];
    const [x,y] = pt(i, R * results[tr]/100);
    userPts += `${x.toFixed(1)},${y.toFixed(1)} `;
  }
  html += `<polygon points="${userPts.trim()}" fill="rgba(26,26,23,0.10)" stroke="var(--text)" stroke-width="2"/>`;

  // Точки
  for(let i=0;i<5;i++){
    const tr = traits[i];
    const [x,y] = pt(i, R * results[tr]/100);
    html += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="7" fill="${colorFor(tr)}" stroke="var(--bg)" stroke-width="2" style="cursor: pointer;" data-trait="${tr}"/>`;
  }

  // Лейблы осей
  const labels = I18N[lang].traits;
  for(let i=0;i<5;i++){
    const tr = traits[i];
    const [x,y] = pt(i, R + 24);
    const anchor = Math.abs(x-cx) < 5 ? "middle" : (x > cx ? "start" : "end");
    html += `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="${anchor}" dominant-baseline="middle" font-size="13" font-weight="500" fill="var(--text)" style="cursor: pointer;" data-trait="${tr}">${labels[tr]}</text>`;
    const [x2,y2] = pt(i, R + 42);
    html += `<text x="${x2.toFixed(1)}" y="${y2.toFixed(1)}" text-anchor="${anchor}" dominant-baseline="middle" font-size="12" fill="var(--text-3)" font-variant-numeric="tabular-nums">${results[tr]}</text>`;
  }

  svg.innerHTML = html;

  // Клик по лейблу/точке
  svg.querySelectorAll("[data-trait]").forEach(node => {
    node.addEventListener("click", e => {
      currentTrait = e.target.getAttribute("data-trait");
      renderDetail();
      renderTraitsList();
    });
  });
}

function renderTraitsList(){
  const t = I18N[lang];
  const host = $("traits-card");
  host.innerHTML = "";
  const hint = el("p", { class: "traits-card-hint" }, t.click_hint);
  host.appendChild(hint);
  const ageUse = compareMode === "age" ? ageForCompare : demo.age;
  const norm = getNorm(ageUse, demo.gender);

  ["O","C","E","A","N"].forEach(tr => {
    const score = results[tr];
    const mean = norm[tr].mean;
    const sd = norm[tr].sd;
    const diff = Math.round(score - mean);
    const lvl = levelOf(score, mean, sd);

    let diffEl;
    if(Math.abs(diff) < 3){
      diffEl = `<span class="trait-diff" style="color: var(--text-3);">${t.vs_norm_eq}</span>`;
    } else if(diff > 0){
      diffEl = `<span class="trait-diff" style="color: var(--grow);">${t.vs_norm_high(diff)}</span>`;
    } else {
      diffEl = `<span class="trait-diff" style="color: var(--fall);">${t.vs_norm_low(-diff)}</span>`;
    }

    const row = el("div", {
      class: "trait-row" + (tr === currentTrait ? " active" : ""),
      "data-trait": tr
    });
    row.innerHTML = `
      <div class="trait-row-head">
        <div class="trait-name">
          <div class="trait-dot" style="background: ${colorFor(tr)}"></div>
          <div>${t.traits[tr]}</div>
        </div>
        <div class="trait-value">${score}${diffEl}</div>
      </div>
      <div class="trait-bar">
        <div class="trait-bar-norm" style="left: ${Math.max(0,mean-0.5*sd)}%; right: ${Math.max(0, 100-(mean+0.5*sd))}%;"></div>
        <div class="trait-bar-fill" style="width: ${score}%; background: ${colorFor(tr)};"></div>
      </div>
    `;
    row.addEventListener("click", () => {
      currentTrait = tr;
      renderDetail();
      renderTraitsList();
    });
    host.appendChild(row);
  });
}

function renderDetail(){
  const t = I18N[lang];
  const tr = currentTrait;
  const ageUse = compareMode === "age" ? ageForCompare : demo.age;
  const norm = getNorm(ageUse, demo.gender);
  const score = results[tr];
  const lvl = levelOf(score, norm[tr].mean, norm[tr].sd);

  $("detail-title").textContent = t.traits[tr];
  $("detail-title").style.color = colorFor(tr);
  $("detail-level").textContent = t.level[lvl];
  $("detail-text").textContent = t.descriptions[tr][lvl];

  const facets = t.facets[tr];
  const host = $("detail-facets");
  host.innerHTML = "";
  facets.forEach((f, idx) => {
    // Приблизительное распределение балла по фасетам: добавим псевдо-шум на основе общего балла и индекса
    const variation = ((tr.charCodeAt(0) * (idx+1)) % 11) - 5;
    const fscore = Math.max(0, Math.min(100, score + variation));
    const card = el("div", { class: "facet" });
    card.innerHTML = `
      <div class="facet-name">${f.name} <span>${fscore}</span></div>
      <p class="facet-text">${f.text}</p>
    `;
    host.appendChild(card);
  });
}

function renderTimeline(){
  const t = I18N[lang];
  const traits = ["O","C","E","A","N"];
  const svg = $("timeline-svg");
  const W = 700, H = 220;
  const padL = 40, padR = 20, padT = 20, padB = 30;
  const w = W - padL - padR;
  const h = H - padT - padB;

  const ages = [];
  for(let a = 20; a <= 70; a += 2) ages.push(a);

  const series = {};
  traits.forEach(tr => {
    series[tr] = ages.map(a => getNorm(a, demo.gender)[tr].mean);
  });

  // Y-шкала 40..70 (где обычно лежат средние)
  const yMin = 40, yMax = 72;
  function yOf(v){ return padT + h - (v - yMin) / (yMax - yMin) * h; }
  function xOf(a){ return padL + (a - 20) / (70 - 20) * w; }

  let html = "";

  // Сетка
  for(let v = 40; v <= 70; v += 10){
    html += `<line x1="${padL}" y1="${yOf(v)}" x2="${W-padR}" y2="${yOf(v)}" stroke="var(--border)" stroke-width="1"/>`;
    html += `<text x="${padL-6}" y="${yOf(v)+4}" text-anchor="end" font-size="11" fill="var(--text-3)" font-variant-numeric="tabular-nums">${v}</text>`;
  }
  // X-метки
  [20,30,40,50,60,70].forEach(a => {
    html += `<text x="${xOf(a)}" y="${H-8}" text-anchor="middle" font-size="11" fill="var(--text-3)" font-variant-numeric="tabular-nums">${a}</text>`;
  });

  // Линии
  traits.forEach(tr => {
    let d = "";
    series[tr].forEach((v, i) => {
      const x = xOf(ages[i]);
      const y = yOf(v);
      d += (i === 0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1) + " ";
    });
    html += `<path d="${d}" fill="none" stroke="${colorFor(tr)}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  });

  // Маркер юзера
  const ux = xOf(demo.age);
  html += `<line x1="${ux}" y1="${padT}" x2="${ux}" y2="${H-padB}" stroke="var(--text)" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>`;
  // точки юзера на каждой линии — на текущей возрастной отметке
  traits.forEach(tr => {
    const v = getNorm(demo.age, demo.gender)[tr].mean;
    const myv = results[tr];
    // мини-точка норматива
    html += `<circle cx="${ux}" cy="${yOf(v)}" r="3" fill="${colorFor(tr)}" opacity="0.5"/>`;
    // точка-юзер если в зоне
    if(myv >= yMin && myv <= yMax){
      html += `<circle cx="${ux}" cy="${yOf(myv)}" r="5" fill="${colorFor(tr)}" stroke="var(--bg)" stroke-width="2"/>`;
    }
  });
  // Подпись возраста
  html += `<text x="${ux}" y="${padT-4}" text-anchor="middle" font-size="11" fill="var(--text-2)" font-variant-numeric="tabular-nums">${demo.age}</text>`;

  svg.innerHTML = html;

  // Легенда
  const lhost = $("t-legend");
  lhost.innerHTML = "";
  traits.forEach(tr => {
    const item = el("div", { class: "legend-item" });
    item.innerHTML = `<span class="legend-line" style="background: ${colorFor(tr)}"></span>${I18N[lang].traits[tr]}`;
    lhost.appendChild(item);
  });
}

// ====== История ======
function renderHistory(){
  const t = I18N[lang];
  if(history.length < 2){
    $("history-card").style.display = "none";
    return;
  }
  $("history-card").style.display = "block";
  const host = $("hist-rows");
  host.innerHTML = "";
  // Показать последние 5
  const items = history.slice(-6).reverse();
  items.forEach((entry, idx) => {
    const days = (Date.now() - new Date(entry.date).getTime()) / (1000*60*60*24);
    const dateStr = t.hist_relative(days);
    const row = el("div", { class: "history-row" });
    let scoresHtml = "";
    ["O","C","E","A","N"].forEach(tr => {
      scoresHtml += `<span><i style="background: ${colorFor(tr)}"></i>${entry.scores[tr]}</span>`;
    });
    row.innerHTML = `
      <div class="history-date">${dateStr}</div>
      <div class="history-scores">${scoresHtml}</div>
    `;
    host.appendChild(row);
  });
}

// ====== Шеринг PNG ======
function downloadResultImage(){
  const W = 1200, H = 630;
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  const isDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  const colors = isDark ? {
    bg: "#1a1a17", surface: "#25241f", surface2: "#2f2e29",
    text: "#ededeb", text2: "#a8a79f", text3: "#6f6e68",
    accent: "#378ADD", border: "rgba(255,255,255,0.10)"
  } : {
    bg: "#fafaf7", surface: "#ffffff", surface2: "#f1efe8",
    text: "#1a1a17", text2: "#6b6a64", text3: "#9a9994",
    accent: "#378ADD", border: "rgba(0,0,0,0.08)"
  };

  ctx.fillStyle = colors.bg;
  ctx.fillRect(0,0,W,H);

  // Заголовок
  ctx.fillStyle = colors.accent;
  ctx.font = "600 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
  ctx.textBaseline = "top";
  ctx.fillText(I18N[lang].brand.toUpperCase(), 60, 60);

  ctx.fillStyle = colors.text;
  ctx.font = "500 44px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
  ctx.fillText(I18N[lang].title, 60, 100);

  ctx.fillStyle = colors.text2;
  ctx.font = "400 18px -apple-system, sans-serif";
  ctx.fillText(lang === "ru" ? "Мой результат BFI-2-S" : "My BFI-2-S result", 60, 160);

  // Радар справа
  const cx = 880, cy = 340, R = 180;
  const traits = ["O","C","E","A","N"];

  function pt(i, r){
    const a = -Math.PI/2 + i * 2*Math.PI/5;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  }

  // Сетка
  for(let lvl = 1; lvl <= 4; lvl++){
    ctx.beginPath();
    const r = R * lvl/4;
    for(let i=0;i<5;i++){
      const [x,y] = pt(i, r);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle = colors.border;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Норма
  const norm = getNorm(demo.age, demo.gender);
  ctx.fillStyle = "rgba(55,138,221,0.10)";
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const tr = traits[i];
    const hi = Math.min(100, norm[tr].mean + 0.5*norm[tr].sd);
    const [x,y] = pt(i, R*hi/100);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fill();

  // Юзер
  ctx.fillStyle = "rgba(26,26,23," + (isDark ? "0.30" : "0.10") + ")";
  ctx.strokeStyle = colors.text;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const tr = traits[i];
    const [x,y] = pt(i, R*results[tr]/100);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Точки
  for(let i=0;i<5;i++){
    const tr = traits[i];
    const [x,y] = pt(i, R*results[tr]/100);
    ctx.beginPath();
    ctx.arc(x,y,7,0,Math.PI*2);
    ctx.fillStyle = colorFor(tr);
    ctx.fill();
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = colors.bg;
    ctx.stroke();
  }

  // Лейблы
  ctx.font = "500 15px -apple-system, sans-serif";
  for(let i=0;i<5;i++){
    const tr = traits[i];
    const [x,y] = pt(i, R + 28);
    ctx.fillStyle = colors.text;
    ctx.textAlign = Math.abs(x-cx) < 5 ? "center" : (x > cx ? "left" : "right");
    ctx.textBaseline = "middle";
    ctx.fillText(I18N[lang].traits[tr], x, y);
    ctx.font = "400 13px -apple-system, sans-serif";
    ctx.fillStyle = colors.text3;
    const [x2,y2] = pt(i, R + 48);
    ctx.fillText(String(results[tr]), x2, y2);
    ctx.font = "500 15px -apple-system, sans-serif";
  }

  // Текстовый блок слева
  let ty = 230;
  ctx.textAlign = "left";
  ctx.textBaseline = "top";
  traits.forEach(tr => {
    ctx.fillStyle = colorFor(tr);
    ctx.beginPath();
    ctx.arc(72, ty + 12, 7, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = colors.text;
    ctx.font = "500 17px -apple-system, sans-serif";
    ctx.fillText(I18N[lang].traits[tr], 92, ty);
    ctx.fillStyle = colors.text2;
    ctx.font = "500 22px -apple-system, sans-serif";
    ctx.textAlign = "right";
    ctx.fillText(String(results[tr]), 540, ty - 3);
    ctx.textAlign = "left";
    ty += 44;
  });

  // URL
  ctx.fillStyle = colors.text3;
  ctx.font = "400 14px -apple-system, sans-serif";
  ctx.fillText("barcelonovna.github.io/dashboards/big-five", 60, H - 50);

  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "big-five-result.png";
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 200);
  }, "image/png");
}
